<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization License Mapping — Angara</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Top bar ── */
  .topbar {
    background: #fff;
    border-bottom: 1px solid #e0dfd8;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 10px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; border-radius: 8px;
    background: #534AB7; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
  }
  .topbar h1 { font-size: 18px; font-weight: 600; color: #1a1a18; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .fg {
    display: flex;
    border: 1px solid #ccc;
    border-radius: 8px;
    overflow: hidden;
  }
  .fb {
    padding: 7px 16px; font-size: 13px; font-weight: 500;
    background: transparent; border: none; cursor: pointer;
    color: #666; transition: all 0.15s;
  }
  .fb:hover { background: #f5f4f0; }
  .fb.on { background: #534AB7; color: #fff; }
  .fb:not(:last-child) { border-right: 1px solid #ccc; }

  /* ── Page ── */
  .page { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }

  /* ── Summary cards ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .sc {
    background: #fff;
    border: 1px solid #e0dfd8;
    border-radius: 10px;
    padding: 16px 18px;
  }
  .sl { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .sv { font-size: 26px; font-weight: 700; }
  .ss { font-size: 12px; color: #aaa; margin-top: 4px; }

  /* ── Section ── */
  .section { margin-bottom: 32px; }
  .sec-title {
    font-size: 15px; font-weight: 600; color: #1a1a18;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 2px solid #534AB7;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-title svg { opacity: 0.6; }

  /* ── Tables ── */
  .tbl-wrap { background: #fff; border: 1px solid #e0dfd8; border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f5f4f0; }
  th {
    font-size: 12px; font-weight: 600; color: #666;
    text-align: left; padding: 12px 14px;
    border-bottom: 1px solid #e0dfd8;
    white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  td {
    padding: 11px 14px;
    border-bottom: 1px solid #f0efe8;
    color: #1a1a18;
    font-size: 14px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #faf9f7; }
  th.r, td.r { text-align: right; }
  th.c, td.c { text-align: center; }

  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }

  .badge {
    display: inline-block; padding: 3px 9px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
  }
  .ba { background: #e1f5ee; color: #085041; }
  .bd { background: #fcebeb; color: #791f1f; }

  .cur-usd { background: #e6f1fb; color: #0c447c; display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 4px; }
  .cur-inr { background: #faeeda; color: #633806; display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 4px; }

  .plan-tag {
    display: inline-block; padding: 3px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 500;
    background: #eeedfe; color: #3c3489;
  }

  /* Grand total row */
  .grand td { background: #eeedfe; font-weight: 600; color: #3c3489; font-size: 14px; }

  /* ── Software chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    border: 1px solid #ddd; border-radius: 20px;
    padding: 5px 14px; font-size: 13px; cursor: pointer;
    color: #555; background: #fff; transition: all 0.15s;
    font-weight: 500;
  }
  .chip:hover { border-color: #534AB7; color: #534AB7; }
  .chip.on { background: #eeedfe; color: #3c3489; border-color: #afa9ec; font-weight: 600; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }

  /* ── Print ── */
  @media print {
    .topbar { position: static; }
    .filters { display: none; }
    .chips { display: none; }
    body { background: #fff; }
  }
</style>
</head>

function fU(v){return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fI(v){return '₹'+Math.round(v).toLocaleString('en-IN')}
function fmt(v,c){return c==='INR'?fI(v):fU(v)}

function filtered(){
  return DATA.filter(function(d){
    if(curF!=='ALL'&&d.cur!==curF) return false;
    if(stF!=='all'&&d.status!==stF) return false;
    if(swF!=='all'&&d.sw!==swF) return false;
    return true;
  });
}

function setCur(c){
  curF=c;
  ['ALL','USD','INR'].forEach(function(x){document.getElementById('b-'+x.toLowerCase()).classList.toggle('on',x===c)});
  render();
}
function setSt(s){
  stF=s;
  var m={all:'sta',Activated:'act',Deactivated:'dea'};
  ['sta','act','dea'].forEach(function(x){document.getElementById('b-'+x).classList.remove('on')});
  document.getElementById('b-'+m[s]).classList.add('on');
  render();
}
function setSw(s){swF=s;render()}

function render(){
  var d=filtered();

}

function renderSummary(d){
  var usd=d.filter(function(r){return r.cur==='USD'}).reduce(function(s,r){return s+r.amt},0);
  var inr=d.filter(function(r){return r.cur==='INR'}).reduce(function(s,r){return s+r.amt},0);
  var tl=d.reduce(function(s,r){return s+r.lics},0);
  var act=d.filter(function(r){return r.status==='Activated'}).reduce(function(s,r){return s+r.lics},0);
  var sws=new Set(d.map(function(r){return r.sw})).size;
  var depts=new Set(d.map(function(r){return r.dept})).size;
  var h='';
  if(curF==='ALL'||curF==='USD') h+='<div class="sc"><div class="sl">USD spend</div><div class="sv" style="color:#185FA5">'+fU(usd)+'</div><div class="ss">total invoiced</div></div>';
  if(curF==='ALL'||curF==='INR') h+='<div class="sc"><div class="sl">INR spend</div><div class="sv" style="color:#854F0B">'+fI(inr)+'</div><div class="ss">total invoiced</div></div>';
  h+='<div class="sc"><div class="sl">Total licenses</div><div class="sv" style="color:#534AB7">'+tl+'</div><div class="ss">all entries</div></div>';
  h+='<div class="sc"><div class="sl">Active licenses</div><div class="sv" style="color:#0F6E56">'+act+'</div><div class="ss">activated</div></div>';
  h+='<div class="sc"><div class="sl">Software tools</div><div class="sv">'+sws+'</div><div class="ss">in use</div></div>';
  h+='<div class="sc"><div class="sl">Departments</div><div class="sv">'+depts+'</div><div class="ss">covered</div></div>';
  document.getElementById('summary').innerHTML=h;
}

function renderDeptTable(d){
  var m={};
  d.forEach(function(r){
    if(!m[r.dept]) m[r.dept]={usd:0,inr:0,lics:0,act:0,dea:0};
    r.cur==='INR'?m[r.dept].inr+=r.amt:m[r.dept].usd+=r.amt;
    m[r.dept].lics+=r.lics;
    r.status==='Activated'?m[r.dept].act+=r.lics:m[r.dept].dea+=r.lics;
  });
  var entries=Object.entries(m).sort(function(a,b){return(b[1].usd+b[1].inr/84)-(a[1].usd+a[1].inr/84)});
  var tU=0,tI=0,tL=0,tA=0,tD=0;
  var rows=entries.map(function(e){
    tU+=e[1].usd; tI+=e[1].inr; tL+=e[1].lics; tA+=e[1].act; tD+=e[1].dea;
    return '<tr>'
      +'<td><strong>'+e[0]+'</strong></td>'
      +'<td class="c">'+e[1].lics+'</td>'
      +'<td class="r">'+(e[1].usd?fU(e[1].usd):'—')+'</td>'
      +'<td class="r">'+(e[1].inr?fI(e[1].inr):'—')+'</td>'
      +'<td class="c">'+(e[1].act?'<span class="badge ba">'+e[1].act+'</span>':'—')+'</td>'
      +'<td class="c">'+(e[1].dea?'<span class="badge bd">'+e[1].dea+'</span>':'—')+'</td>'
      +'</tr>';
  }).join('');
  rows+='<tr class="grand">'
    +'<td>Grand total</td>'
    +'<td class="c">'+tL+'</td>'
    +'<td class="r">'+(tU?fU(tU):'—')+'</td>'
    +'<td class="r">'+(tI?fI(tI):'—')+'</td>'
    +'<td class="c">'+tA+'</td>'
    +'<td class="c">'+tD+'</td>'
    +'</tr>';
  document.getElementById('deptBody').innerHTML=rows||'<tr><td colspan="6" class="empty">No data</td></tr>';
}

function renderChips(){
  var all=[...new Set(DATA.map(function(r){return r.sw}))].sort();
  document.getElementById('chips').innerHTML=
    '<div class="chip'+(swF==='all'?' on':'')+'" onclick="setSw(\'all\')">All software</div>'
    +all.map(function(s){
      return '<div class="chip'+(swF===s?' on':'')+'" onclick="setSw(\''+s.replace(/'/g,"\\'")+'\')"><span class="dot" style="background:'+sc(s)+'"></span>'+s+'</div>';
    }).join('');
}

function renderSwTable(d){
  var rows=d.map(function(r){
    var cb=r.cur==='INR'?'<span class="cur-inr">₹INR</span>':'<span class="cur-usd">$USD</span>';
    var sb=r.status==='Activated'?'<span class="badge ba">Active</span>':'<span class="badge bd">Inactive</span>';
    return '<tr>'
      +'<td><span class="dot" style="background:'+sc(r.sw)+'"></span><strong>'+r.sw+'</strong></td>'
      +'<td><span class="plan-tag">'+r.plan+'</span></td>'
      +'<td>'+r.dept+'</td>'
      +'<td class="c">'+r.lics+'</td>'
      +'<td class="r"><strong>'+fmt(r.amt,r.cur)+'</strong> '+cb+'</td>'
      +'<td class="c">'+r.year+'</td>'
      +'<td class="c">'+sb+'</td>'
      +'</tr>';
  }).join('');
  document.getElementById('swBody').innerHTML=rows||'<tr><td colspan="7" class="empty">No matching data</td></tr>';
}

render();
</script>
</body>
</html>
